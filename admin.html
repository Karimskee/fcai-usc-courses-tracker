<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FCAI Course Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body data-theme="dark">

    <header class="glass-panel">
        <div class="container header-content">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gradient"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <h1 class="text-gradient">Admin Panel</h1>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn secondary">Back to App</a>
                <button id="btn-publish" class="btn primary hidden">Publish Changes</button>
                <button id="btn-logout" class="btn danger hidden">Logout</button>
            </div>
        </div>
    </header>

    <div class="container admin-container">
        <!-- Auth Section -->
        <div id="auth-section" class="glass-panel auth-panel">
            <h2>GitHub Authentication</h2>
            <p>Please enter a GitHub Personal Access Token (PAT) with <code>repo</code> scope to manage the data.</p>
            
            <div class="form-group">
                <label for="github-owner">Repository Owner (e.g. Karimskee)</label>
                <input type="text" id="github-owner" placeholder="Username or Organization">
            </div>
            
            <div class="form-group">
                <label for="github-repo">Repository Name (e.g. fcai-usc-courses-tracker)</label>
                <input type="text" id="github-repo" placeholder="Repository Name">
            </div>

            <div class="form-group">
                <label for="github-token">Personal Access Token</label>
                <input type="password" id="github-token" placeholder="ghp_...">
            </div>
            
            <button id="btn-login" class="btn primary">Authenticate</button>
            <div id="auth-error" class="error-msg hidden">Authentication failed. Check your token and permissions.</div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="dashboard-grid hidden">
            
            <div class="sidebar glass-panel">
                <div class="form-group">
                    <label>Select Faculty</label>
                    <div class="custom-select">
                        <select id="admin-faculty-select">
                            <option value="USC">FCAI USC</option>
                            <option value="NUSC">FCAI NUSC</option>
                        </select>
                    </div>
                </div>
                
                <hr class="sidebar-divider">
                
                <ul class="nav-list">
                    <li class="active" data-view="departments">Departments</li>
                    <li data-view="courses">Courses</li>
                    <li data-view="doctors">Assign Professors</li>
                </ul>
            </div>
            
            <div class="main-content glass-panel" id="admin-main-view">
                <!-- Content injected here by JS -->
                <div class="loading-spinner">Loading data...</div>
            </div>
            
        </div>
    </div>
    
    <!-- Modal for adding/editing a course -->
    <div id="course-modal" class="modal-overlay hidden">
        <div class="modal glass-panel" style="max-width: 600px; width: 95%;">
            <h3 id="course-modal-title">Edit Course</h3>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" id="modal-code">
                </div>
                <div class="form-group">
                    <label>Credit Hours</label>
                    <input type="number" id="modal-hours" min="0" max="6">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>English Name</label>
                    <input type="text" id="modal-name-en">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Arabic Name</label>
                    <input type="text" id="modal-name-ar" dir="rtl">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Prerequisites (Comma separated codes)</label>
                    <input type="text" id="modal-prereqs" placeholder="CS101, MA101">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Expected Professors (Comma separated names)</label>
                    <input type="text" id="modal-doctors" placeholder="Dr. Ahmed, Dr. Ali">
                </div>
            </div>
            
            <div class="modal-actions" style="margin-top: 20px;">
                <button id="modal-course-cancel" class="btn secondary">Cancel</button>
                <button id="modal-course-save" class="btn primary">Save Course</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/admin.js"></script>
</body>
</html>
