<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FCAI Course Tracker</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/chart.css">
    
    <!-- Libraries -->
    <!-- html-to-image for PNG export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <!-- jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body data-theme="dark">
    <!-- Header -->
    <header class="glass-panel" id="main-header">
        <div class="container header-content">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gradient">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <h1 data-i18n="app_title" class="text-gradient">FCAI Course Tracker</h1>
            </div>
            <div class="header-actions">
                <button id="lang-toggle" class="btn-icon" aria-label="Toggle Language" title="English / عربي">
                    <span class="lang-text">عربي</span>
                </button>
                <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
                    <svg class="sun-icon hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <a href="admin.html" class="btn-icon admin-link" aria-label="Admin Panel" title="Admin">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Selector Bar -->
    <div class="selector-bar glass-panel">
        <div class="container selector-content">
            <div class="selectors">
                <div class="selector-group">
                    <label for="faculty-select" data-i18n="faculty">Faculty</label>
                    <div class="custom-select">
                        <select id="faculty-select">
                            <option value="USC" data-i18n="usc">FCAI USC</option>
                            <option value="NUSC" data-i18n="nusc">FCAI NUSC</option>
                        </select>
                    </div>
                </div>
                <div class="selector-group">
                    <label for="dept-select" data-i18n="department">Department</label>
                    <div class="custom-select">
                        <select id="dept-select">
                            <!-- Populated dynamically -->
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-info">
                    <span class="progress-label" data-i18n="progress">Progress</span>
                    <span class="progress-text"><span id="completed-hours">0</span> / <span id="total-hours">145</span> <span data-i18n="hours">hrs</span></span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Chart Area -->
    <main class="chart-container" id="chart-scroll-area">
        <div class="chart-wrapper" id="chart-wrapper">
            <!-- SVG overlay for prerequisite arrows -->
            <svg id="arrows-svg" class="arrows-overlay" preserveAspectRatio="none"></svg>
            
            <!-- HTML grid for course cards -->
            <div id="course-grid" class="course-grid">
                <!-- Columns and cards injected by JS -->
            </div>
        </div>
    </main>

    <!-- Floating Action Bar -->
    <div class="fab-container glass-panel">
        <button id="btn-export-png" class="btn primary" title="Export as Image">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span data-i18n="export_png">Image</span>
        </button>
        <button id="btn-export-pdf" class="btn primary" title="Export as PDF">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span data-i18n="export_pdf">PDF</span>
        </button>
        <div class="divider"></div>
        <button id="btn-reset" class="btn danger" title="Reset Progress">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            <span class="sr-only">Reset</span>
        </button>
    </div>

    <!-- Modals & Overlays -->
    <div id="popover" class="course-popover glass-panel hidden">
        <!-- Content injected by JS -->
    </div>
    
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <h3 id="modal-title">Confirm</h3>
            <p id="modal-desc">Are you sure?</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn secondary" data-i18n="cancel">Cancel</button>
                <button id="modal-confirm" class="btn primary" data-i18n="confirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/state.js"></script>
    <script src="js/data.js"></script>
    <script src="js/tooltip.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
